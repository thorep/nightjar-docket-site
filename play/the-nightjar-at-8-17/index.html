<body>

    </div>
  </dialog>

  <script>const CASE_DATA = {"schemaVersion":1,"slug":"the-nightjar-at-8-17","caseNumber":"000","title":"The Nightjar at 8:17","subtitle":"A silent clock, a brass bird, and one photograph taken too early.","brand":"Nightjar Docket","rating":"Family-safe · Age 12+","players":"1–6 players","duration":"5–10 minutes","difficulty":"1 / 5","briefing":["At 8:17 p.m., during a private preview at Morrow Hall, a restored astronomical clock gave one clear chime and unfolded its brass nightjar. That should have been impossible: the clock was unwound, its striking mechanism was disconnected, and tomorrow’s public reveal was under embargo.","Only three people were in the gallery. One of them planned the moment. Work out what made the silent clock chime, who staged it, and why the photograph mattered."],"objective":"Identify who caused the impossible chime, explain how it was staged, and determine the intended payoff.","presentation":{"heroAlt":"An ornate black astronomical clock with a brass nightjar automaton emerging under a museum spotlight while a camera waits nearby","heroCaption":"The photograph began before the surprise.","briefingTitle":"One impossible chime.","suspectsTitle":"Three carefully timed stories.","workspaceTitle":"Observe. Compare. Accuse.","accusationTitle":"Record the complete explanation.","accusationDescription":"Choose the person, method, and intended payoff that fit every timestamp.","footer":"Nightjar Docket · This free case stores progress only in your browser."},"suspects":[{"id":"eleanor","name":"Eleanor Ash","role":"Conservation lead","summary":"Restored the clock and knows every control.","statement":"I removed the winding key at eight and was introducing the restoration from the lectern. The clock could not strike on its own."},{"id":"ren","name":"Ren Ito","role":"Event coordinator","summary":"Controlled the lighting cue and wanted tomorrow’s reveal protected.","statement":"I was in the lighting booth throughout the dimming cue. The clock is not connected to our controls."},{"id":"milo","name":"Milo Crane","role":"Press photographer","summary":"Needed a dramatic image before his newspaper deadline.","statement":"I was photographing the painted ceiling. The chime made me turn, and I caught the bird by luck."}],"evidence":[{"id":"incident","phase":1,"kind":"Incident record","title":"The chime at 20:17","source":"Morrow Hall preview log","stamp":"20:17","body":"<table><tr><th>20:00</th><td>Winding key removed and sealed at the lectern</td></tr><tr><th>20:16:50</th><td>Gallery lights dimmed</td></tr><tr><th>20:17:00</th><td>One chime; brass nightjar emerges</td></tr><tr><th>20:17:04</th><td>Clock hands remain at 20:00</td></tr></table><p>No second chime followed. The clock and cabinet were undamaged.</p>"},{"id":"mechanism","phase":1,"kind":"Conservation card","title":"Demonstration control","source":"Eleanor Ash · restoration notes","stamp":"Technical","body":"<p>The clock’s time and striking trains are disconnected during conservation. It cannot run or strike from the winding key.</p><p>A recessed brass tab marked <strong>DEMONSTRATE</strong> sits at the clock’s right-hand base. Pressing the tab in person produces exactly <strong>one chime and one automaton cycle</strong> without moving the hands.</p><div class=\"document-note\">The tab has no timer, wireless receiver, or connection to the gallery lighting system.</div>"},{"id":"booth","phase":1,"kind":"Access record","title":"Lighting booth log","source":"Monitored gallery door","stamp":"20:12–20:21","body":"<table><tr><th>20:12:08</th><td>Ren Ito enters booth</td></tr><tr><th>20:16:50</th><td>Preset B dims gallery lamps</td></tr><tr><th>20:21:13</th><td>Ren Ito opens booth door</td></tr></table><p>The booth window overlooks the gallery. Its control panel operates lamps only.</p>"},{"id":"panorama","phase":2,"kind":"Setup photograph","title":"Gallery panorama","source":"Fixed documentation camera","stamp":"20:16:57","body":"<div class=\"document-note\"><strong>Three seconds before the chime:</strong> Eleanor stands at the lectern with both hands on her open folder. Ren is visible behind the closed booth window. Milo is crouched beside the clock’s right-hand base. His tripod is already aimed directly at the clock.</div><p>The image timestamp is synchronized to the incident recorder.</p>"},{"id":"contact-sheet","phase":2,"kind":"Camera metadata","title":"Milo’s contact sheet","source":"Original image sequence","stamp":"Burst mode","body":"<table><tr><th>20:16:59.72</th><td>Clock tightly framed; hatch closed</td></tr><tr><th>20:17:00.05</th><td>Hatch begins moving</td></tr><tr><th>20:17:00.31</th><td>Nightjar emerging</td></tr><tr><th>20:17:01.02</th><td>Nightjar fully extended</td></tr></table><p>The first exposure began <strong>before</strong> the 20:17:00 chime. Milo said he turned toward the clock only after hearing it.</p>"},{"id":"assignment","phase":2,"kind":"Press assignment","title":"Tomorrow’s lead image","source":"Crane desk · editor note","stamp":"Deadline 20:25","body":"<blockquote><p>The opening bird is tomorrow’s lead image. A closed clock is secondary. The embargo lifts after our print deadline.</p></blockquote><p>A venue note clipped beneath it reads: <strong>No demonstration before Saturday’s public reveal.</strong></p><p>Milo’s edition went to press eight minutes after the chime.</p>"}],"phases":[{"number":1,"title":"A clock that did not run","intro":"The one-note performance looked mechanical. Decide what could produce it without starting the clock.","evidenceIds":["incident","mechanism","booth"],"checkpoint":{"type":"choice","prompt":"What produced exactly one chime while the clock hands stayed still?","options":[{"id":"lighting","label":"The gallery lighting cue"},{"id":"demonstrate","label":"The recessed DEMONSTRATE tab"},{"id":"winding","label":"A hidden turn of the winding key"}],"answer":"demonstrate","success":"Correct. The manual tab produces one chime and one bird cycle without moving the hands.","hints":["Look for a control that works independently of the clock movement.","Only one control is described as producing exactly one chime."]}},{"number":2,"title":"The reaction that started early","intro":"Compare where everyone stood with the order of Milo’s photographs.","evidenceIds":["panorama","contact-sheet","assignment"],"checkpoint":{"type":"choice","prompt":"Which fact directly contradicts Milo’s claim that the chime made him turn?","options":[{"id":"deadline","label":"His newspaper deadline was 20:25"},{"id":"early-burst","label":"His camera burst began before the chime"},{"id":"booth-window","label":"Ren was visible through the booth window"}],"answer":"early-burst","success":"Exactly. Milo had framed the clock and started shooting before the supposedly surprising sound.","hints":["A reaction photograph starts after a surprise.","Compare the first camera timestamp with 20:17:00."]}}],"accusation":{"culprit":"milo","method":"manual-tab","destination":"front-page","labels":{"culprit":"Who staged the chime?","method":"How was it triggered?","destination":"What was the intended payoff?"},"feedback":{"incomplete":"Complete all three parts of the explanation.","incorrect":"That explanation conflicts with at least one timestamp. Recheck the mechanism card, panorama, and first camera exposure.","success":"Explanation accepted. The complete reconstruction is now unsealed."},"methods":[{"id":"manual-tab","label":"The recessed DEMONSTRATE tab was pressed by hand."},{"id":"lighting-cue","label":"The lighting booth sent a hidden remote signal."},{"id":"winding-key","label":"The winding key was secretly returned to the clock."}],"destinations":[{"id":"front-page","label":"A dramatic lead photograph before the embargo."},{"id":"insurance","label":"An insurance claim for a damaged mechanism."},{"id":"delay","label":"A reason to postpone the public opening."}]},"solution":{"headline":"Milo Crane staged the impossible chime.","summary":["The clock did not run: its hands never moved and it chimed only once. The conservation card identifies the manual DEMONSTRATE tab as the one control that produces precisely that result.","Eleanor’s hands were visible at the lectern and Ren remained inside a monitored booth whose controls operated only the lights. Milo alone was crouched beside the tab.","Milo’s camera was already framed and firing before the chime. His editor needed the emerging nightjar as tomorrow’s lead image, but the embargo lifted after the print deadline."],"epilogue":"Milo admitted the stunt. Nothing was damaged, the newspaper held the photograph until the public reveal, and Morrow Hall added a discreet cover over the demonstration tab."},"offer":{"eyebrow":"Your next case","heading":"Ready for a full-length mystery?","body":"The Bellweather Book expands the investigation to twelve exhibits, three evidence phases, four suspects, optional hints, and a printable case packet. It downloads once and works offline.","label":"Investigate The Bellweather Book","url":"https://thorep.github.io/nightjar-docket-site/?utm_source=nightjar_docket_site&utm_medium=free_game&utm_campaign=free_mini&utm_content=case_closed"},"web":{"path":"play/the-nightjar-at-8-17/","title":"Free 10-Minute Family Mystery Game | Nightjar Docket","description":"Play a free 10-minute, family-safe detective mystery in your browser. Examine six illustrated clues and solve the case with no signup, app, or printing.","canonicalUrl":"https://thorep.github.io/nightjar-docket-site/play/the-nightjar-at-8-17/","imageUrl":"https://thorep.github.io/nightjar-docket-site/assets/free/the-nightjar-at-8-17-og.jpg","imageAlt":"An ornate astronomical clock reveals a brass nightjar while a camera waits nearby"}};</script>
  <script>
    (() => {
      "use strict";

      const storageKey = `nightjar-docket:${CASE_DATA.slug}:v1`;
      const freshState = () => ({ completed: [], hints: {}, flagged: [], notes: "", solved: false });
      let state = loadState();
      let activeEvidenceId = null;

      const $ = (selector, root = document) => root.querySelector(selector);
      const el = (tag, className, text) => {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text !== undefined) node.textContent = text;
        return node;
      };
      const normalize = value => String(value ?? "").trim().toLowerCase().replace(/\s+/g, " ");

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
          if (!saved || typeof saved !== "object") return freshState();
          return {
            ...freshState(),
            ...saved,
            completed: Array.isArray(saved.completed) ? [...saved.completed] : [],
            hints: saved.hints && typeof saved.hints === "object" ? { ...saved.hints } : {},
            flagged: Array.isArray(saved.flagged) ? [...saved.flagged] : []
          };
        } catch {
          return freshState();
        }
      }

      function saveState() {
        try {
          localStorage.setItem(storageKey, JSON.stringify(state));
        } catch {
          // Keep the case playable when browser privacy settings disable storage.
        }
      }

      function currentPhase() {
        for (const phase of CASE_DATA.phases) {
          if (!state.completed.includes(phase.number)) return phase.number;
        }
        return CASE_DATA.phases.length + 1;
      }

      function isUnlocked(phaseNumber) {
        return phaseNumber <= currentPhase();
      }

      function renderStatic() {
        document.title = `${CASE_DATA.title} · ${CASE_DATA.brand}`;
        $("#caseNumber").textContent = CASE_DATA.caseNumber;
        $("#case-title").textContent = CASE_DATA.title;
        $("#caseSubtitle").textContent = CASE_DATA.subtitle;
        const presentation = CASE_DATA.presentation || {};
        $("#heroArt").setAttribute(
          "aria-label",
          presentation.heroAlt ||
            "A midnight-blue antique atlas and evidence docket under a museum spotlight",
        );
        $("#heroCaption").textContent =
          presentation.heroCaption || "The evidence is already on the table.";
        $("#briefing-title").textContent =
          presentation.briefingTitle || "A perfect copy.";
        $("#suspect-title").textContent =
          presentation.suspectsTitle || "Four imperfect stories.";
        $("#workspace-title").textContent =
          presentation.workspaceTitle || "Examine. Compare. Accuse.";
        $("#accusation-title").textContent =
          presentation.accusationTitle || "Put the whole case on record.";
        $("#accusationDescription").textContent =
          presentation.accusationDescription ||
          "Select the person, method, and destination that fit every decisive clue.";
        $("#footerCopy").textContent =
          presentation.footer ||
          "Nightjar Docket · The case works offline and stores progress only on this device.";

        const facts = [
          ["Players", CASE_DATA.players],
          ["Time", CASE_DATA.duration],
          ["Difficulty", CASE_DATA.difficulty],
          ["Content", CASE_DATA.rating]
        ];
        $("#caseFacts").replaceChildren(...facts.map(([term, value]) => {
          const row = el("div");
          row.append(el("dt", "", term), el("dd", "", value));
          return row;
        }));

        const briefing = $("#briefingCopy");
        briefing.replaceChildren(...CASE_DATA.briefing.map(copy => el("p", "", copy)));
        const objective = el("div", "objective");
        objective.innerHTML = `<strong>Your objective</strong>${escapeHtml(CASE_DATA.objective)}`;
        briefing.append(objective);

        $("#suspectList").replaceChildren(...CASE_DATA.suspects.map(suspect => {
          const card = el("article", "suspect");
          card.innerHTML = `
            <h3>${escapeHtml(suspect.name)}</h3>
            <p class="role">${escapeHtml(suspect.role)}</p>
            <p>${escapeHtml(suspect.summary)}</p>
            <blockquote>“${escapeHtml(suspect.statement)}”</blockquote>`;
          return card;
        }));

        $("#printEvidenceList").replaceChildren(...CASE_DATA.evidence.map(evidence => {
          const document = el("article");
          document.innerHTML = `
            <span class="evidence-type">${escapeHtml(evidence.kind)} · ${escapeHtml(evidence.stamp)}</span>
            <h3>${escapeHtml(evidence.title)}</h3>
            <p class="print-source">${escapeHtml(evidence.source)}</p>
            <div class="document">${evidence.body}</div>`;
          return document;
        }));
      }

      function renderInvestigation() {
        renderLedger();
        const phasesRoot = $("#phases");
        phasesRoot.replaceChildren(...CASE_DATA.phases.map(renderPhase));
        $("#accusation").classList.toggle("visible", state.completed.length === CASE_DATA.phases.length);
        renderAccusationFields();
        $("#notes").value = state.notes;
        if (state.solved) renderSolution();
      }

      function renderLedger() {
        const phaseNow = currentPhase();
        $("#ledger").replaceChildren(...CASE_DATA.phases.map(phase => {
          const item = el("div", "ledger-step");
          if (state.completed.includes(phase.number)) item.classList.add("done");
          else if (phase.number === phaseNow) item.classList.add("current");
          item.setAttribute("aria-current", phase.number === phaseNow ? "step" : "false");
          item.append(el("span", "ledger-num", state.completed.includes(phase.number) ? "✓" : String(phase.number)));
          item.append(el("span", "", phase.title));
          return item;
        }));
      }

      function renderPhase(phase) {
        const section = el("section", `phase${isUnlocked(phase.number) ? "" : " locked"}`);
        section.id = `phase-${phase.number}`;
        section.setAttribute("aria-labelledby", `phase-${phase.number}-title`);

        const head = el("div", "phase-heading");
        const title = el("div");
        title.append(el("p", "phase-number", `Phase ${phase.number}`));
        title.append(el("h2", "", phase.title));
        title.lastChild.id = `phase-${phase.number}-title`;
        head.append(title, el("p", "", phase.intro));
        section.append(head);

        const grid = el("div", "evidence-grid");
        grid.append(...phase.evidenceIds.map(id => renderEvidenceCard(CASE_DATA.evidence.find(item => item.id === id))));
        section.append(grid);

        if (!state.completed.includes(phase.number)) section.append(renderCheckpoint(phase));
        else {
          const done = el("div", "hint-box");
          done.textContent = phase.checkpoint.success;
          section.append(done);
        }
        return section;
      }

      function renderEvidenceCard(evidence) {
        const card = el("button", `evidence-card${state.flagged.includes(evidence.id) ? " flagged" : ""}`);
        card.type = "button";
        card.dataset.evidenceId = evidence.id;
        card.setAttribute("aria-label", `Open evidence: ${evidence.title}`);
        card.innerHTML = `
          <span class="evidence-type">${escapeHtml(evidence.kind)}</span>
          <span class="stamp">${escapeHtml(evidence.stamp)}</span>
          <h3>${escapeHtml(evidence.title)}</h3>
          <span class="source">${escapeHtml(evidence.source)}</span>`;
        card.addEventListener("click", () => openEvidence(evidence.id));
        return card;
      }

      function renderCheckpoint(phase) {
        const wrap = el("div", "checkpoint");
        const copy = el("div");
        copy.innerHTML = `<h3>Checkpoint ${phase.number}</h3><p>Solve this deduction to open the next evidence packet.</p>`;
        const form = el("form");
        form.dataset.phase = String(phase.number);
        const fieldset = el("fieldset");
        const legend = el("legend", "", phase.checkpoint.prompt);
        fieldset.append(legend);

        if (phase.checkpoint.type === "choice") {
          const choices = el("div", "choices");
          phase.checkpoint.options.forEach(option => {
            const label = el("label", "choice");
            const input = el("input");
            input.type = "radio";
            input.name = `checkpoint-${phase.number}`;
            input.value = option.id;
            label.append(input, el("span", "", option.label));
            choices.append(label);
          });
          fieldset.append(choices);
        } else {
          const input = el("input", "text-input");
          input.type = phase.checkpoint.type === "number" ? "number" : "text";
          input.inputMode = phase.checkpoint.type === "number" ? "numeric" : "text";
          input.name = `checkpoint-${phase.number}`;
          input.placeholder = phase.checkpoint.placeholder || "";
          input.autocomplete = "off";
          fieldset.append(input);
        }

        const actions = el("div", "checkpoint-actions");
        const submit = el("button", "button", "Check deduction");
        submit.type = "submit";
        const hint = el("button", "button secondary small", "Use a hint");
        hint.type = "button";
        hint.addEventListener("click", () => showHint(phase.number));
        actions.append(submit, hint);
        fieldset.append(actions);

        const hintBox = el("div", "hint-box");
        hintBox.hidden = true;
        hintBox.id = `hint-${phase.number}`;
        const feedback = el("p", "feedback");
        feedback.id = `feedback-${phase.number}`;
        feedback.setAttribute("role", "status");
        feedback.setAttribute("aria-live", "polite");

        form.append(fieldset, hintBox, feedback);
        form.addEventListener("submit", event => {
          event.preventDefault();
          checkCheckpoint(phase, new FormData(form));
        });
        wrap.append(copy, form);

        const usedHints = state.hints[phase.number] || 0;
        if (usedHints) {
          hintBox.hidden = false;
          hintBox.textContent = phase.checkpoint.hints[Math.min(usedHints - 1, phase.checkpoint.hints.length - 1)];
        }
        return wrap;
      }

      function checkCheckpoint(phase, formData) {
        const value = normalize(formData.get(`checkpoint-${phase.number}`));
        const correct = [phase.checkpoint.answer, ...(phase.checkpoint.aliases || [])].map(normalize).includes(value);
        const feedback = $(`#feedback-${phase.number}`);
        if (!value) {
          feedback.className = "feedback error";
          feedback.textContent = "Record a deduction before checking it.";
          return;
        }
        if (!correct) {
          feedback.className = "feedback error";
          feedback.textContent = "That conclusion leaves at least one decisive clue unexplained. Review the evidence or use a hint.";
          return;
        }
        state.completed = [...new Set([...state.completed, phase.number])].sort((a, b) => a - b);
        saveState();
        renderInvestigation();
        const next = $(`#phase-${phase.number + 1}`) || $("#accusation");
        next?.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function showHint(phaseNumber) {
        const phase = CASE_DATA.phases.find(item => item.number === phaseNumber);
        const count = Math.min((state.hints[phaseNumber] || 0) + 1, phase.checkpoint.hints.length);
        state.hints[phaseNumber] = count;
        saveState();
        const box = $(`#hint-${phaseNumber}`);
        box.hidden = false;
        box.textContent = phase.checkpoint.hints[count - 1];
      }

      function openEvidence(id) {
        activeEvidenceId = id;
        const evidence = CASE_DATA.evidence.find(item => item.id === id);
        $("#dialogType").textContent = `${evidence.kind} · ${evidence.stamp}`;
        $("#dialogTitle").textContent = evidence.title;
        $("#dialogSource").textContent = evidence.source;
        $("#dialogBody").innerHTML = evidence.body;
        $("#flagEvidence").setAttribute("aria-pressed", String(state.flagged.includes(id)));
        $("#flagEvidence").textContent = state.flagged.includes(id) ? "Marked significant" : "Mark significant";
        $("#evidenceDialog").showModal();
      }

      function nextEvidence() {
        const unlocked = CASE_DATA.evidence.filter(item => isUnlocked(item.phase));
        const index = unlocked.findIndex(item => item.id === activeEvidenceId);
        const next = unlocked[(index + 1) % unlocked.length];
        openEvidence(next.id);
      }

      function toggleFlag() {
        if (!activeEvidenceId) return;
        if (state.flagged.includes(activeEvidenceId)) {
          state.flagged = state.flagged.filter(id => id !== activeEvidenceId);
        } else {
          state.flagged.push(activeEvidenceId);
        }
        saveState();
        $("#flagEvidence").setAttribute("aria-pressed", String(state.flagged.includes(activeEvidenceId)));
        $("#flagEvidence").textContent = state.flagged.includes(activeEvidenceId) ? "Marked significant" : "Mark significant";
        document.querySelectorAll(`[data-evidence-id="${activeEvidenceId}"]`).forEach(card => {
          card.classList.toggle("flagged", state.flagged.includes(activeEvidenceId));
        });
      }

      function renderAccusationFields() {
        const root = $("#accusationFields");
        if (root.childElementCount) return;
        const labels = CASE_DATA.accusation.labels || {};
        root.append(
          selectField(
            "accused",
            labels.culprit || "Who made the swap?",
            CASE_DATA.suspects.map(item => ({ id: item.id, label: `${item.name} — ${item.role}` })),
          ),
          selectField("method", labels.method || "How was it done?", CASE_DATA.accusation.methods),
          selectField(
            "destination",
            labels.destination || "Where was it sent?",
            CASE_DATA.accusation.destinations,
          ),
        );
      }

      function selectField(id, labelText, options) {
        const wrap = el("div", "field");
        const label = el("label", "", labelText);
        label.htmlFor = id;
        const select = el("select");
        select.id = id;
        select.name = id;
        select.append(new Option("Select…", ""));
        options.forEach(option => select.append(new Option(option.label, option.id)));
        wrap.append(label, select);
        return wrap;
      }

      function submitAccusation() {
        const accused = $("#accused").value;
        const method = $("#method").value;
        const destination = $("#destination").value;
        const feedback = $("#accusationFeedback");
        const messages = CASE_DATA.accusation.feedback || {};
        if (!accused || !method || !destination) {
          feedback.className = "feedback error";
          feedback.textContent =
            messages.incomplete || "Complete all three parts of the accusation.";
          return;
        }
        const correct = accused === CASE_DATA.accusation.culprit
          && method === CASE_DATA.accusation.method
          && destination === CASE_DATA.accusation.destination;
        if (!correct) {
          feedback.className = "feedback error";
          feedback.textContent =
            messages.incorrect ||
            "That accusation conflicts with at least one measured fact. Recheck the photograph, package weight, and routing code.";
          return;
        }
        state.solved = true;
        saveState();
        feedback.className = "feedback success";
        feedback.textContent =
          messages.success ||
          "Accusation accepted. The complete reconstruction is now unsealed.";
        renderSolution();
      }

      function renderSolution() {
        const solution = $("#solution");
        solution.classList.add("visible");
        solution.innerHTML = `
          <p class="case-label">Case closed</p>
          <h2>${escapeHtml(CASE_DATA.solution.headline)}</h2>
          <ol>${CASE_DATA.solution.summary.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ol>
          <div class="epilogue">${escapeHtml(CASE_DATA.solution.epilogue)}</div>`;
        if (CASE_DATA.offer) {
          const offer = el("aside", "case-offer");
          offer.innerHTML = `
            <p class="case-label">${escapeHtml(CASE_DATA.offer.eyebrow || "Another case awaits")}</p>
            <h3>${escapeHtml(CASE_DATA.offer.heading)}</h3>
            <p>${escapeHtml(CASE_DATA.offer.body)}</p>
            <a class="button" href="${escapeHtml(CASE_DATA.offer.url)}">${escapeHtml(CASE_DATA.offer.label)}</a>`;
          solution.append(offer);
        }
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      renderStatic();
      renderInvestigation();

      $("#closeDialog").addEventListener("click", () => $("#evidenceDialog").close());
      $("#nextEvidence").addEventListener("click", nextEvidence);
      $("#flagEvidence").addEventListener("click", toggleFlag);
      $("#submitAccusation").addEventListener("click", submitAccusation);
      $("#notes").addEventListener("input", event => {
        state.notes = event.target.value;
        saveState();
      });
      $("#printCase").addEventListener("click", () => window.print());
      $("#resetCase").addEventListener("click", () => {
        if (!confirm("Reset all progress, hints, flags, and notes for this case?")) return;
        try {
          localStorage.removeItem(storageKey);
        } catch {
          // Reset the in-memory state even when storage is unavailable.
        }
        state = freshState();
        $("#solution").classList.remove("visible");
        $("#solution").replaceChildren();
        $("#accusationFeedback").textContent = "";
        ["accused", "method", "destination"].forEach(id => {
          const field = $(`#${id}`);
          if (field) field.value = "";
        });
        renderInvestigation();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
      $("#evidenceDialog").addEventListener("click", event => {
        if (event.target === $("#evidenceDialog")) $("#evidenceDialog").close();
      });
    })();
  </script>
</body>
</html>
